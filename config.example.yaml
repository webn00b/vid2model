# Example runtime profile for convert_video_to_bvh.py
# CLI flags override values from this file.

preset: walk       # default|idle|walk|run|dance
input: ./think.mp4
output_bvh: ./output/think.bvh
output_json: ./output/think.json
output_csv: ./output/think.csv
output_npz: ./output/think.npz
output_trc: ./output/think.trc
output_diag_json: ./output/think.diag.json

model_complexity: 1
min_detection_confidence: 0.5
min_tracking_confidence: 0.5
max_gap_interpolate: 8
opencv_enhance: off   # off|light|strong
max_frame_side: 0     # 0 = disable resize, else clamp longest side before detection
roi_crop: off         # off|auto (adaptive crop around detected person)
progress_every: 100
