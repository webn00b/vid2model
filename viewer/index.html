<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BVH Viewer</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f6fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #64748b;
      --accent: #0f766e;
      --border: #dbe5f0;
    }
    html, body {
      margin: 0;
      height: 100%;
      font-family: "Segoe UI", "SF Pro Text", "Arial", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% 0%, #dff7f1 0%, var(--bg) 35%);
    }
    #app {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    button, input[type="file"]::file-selector-button {
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 14px;
    }
    .file-group {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
    }
    .file-label {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    .file-name {
      font-size: 12px;
      color: var(--text);
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    input[type="range"] {
      width: 220px;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .time {
      font-size: 12px;
      color: var(--muted);
      min-width: 90px;
      text-align: right;
    }
    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .status {
      margin-left: auto;
      color: var(--muted);
      font-size: 13px;
    }
    #canvas-wrap {
      position: relative;
      min-height: 0;
    }
    #hint {
      position: absolute;
      left: 12px;
      bottom: 12px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
      color: var(--muted);
      z-index: 2;
    }
    .retarget-fab {
      position: fixed;
      right: 14px;
      bottom: 14px;
      z-index: 20;
      border: 0;
      border-radius: 999px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 600;
      background: var(--accent);
      color: #fff;
      box-shadow: 0 8px 24px rgba(15, 118, 110, 0.35);
    }
    .retarget-fab:hover {
      filter: brightness(1.05);
    }
    .retarget-fab:active {
      transform: translateY(1px);
    }
    @media (max-width: 720px) {
      .retarget-fab {
        right: 10px;
        bottom: 10px;
        padding: 11px 14px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="toolbar">
      <button id="load-default" class="primary">Load output/think.bvh</button>
      <div class="file-group">
        <span class="file-label">Animation (.bvh)</span>
        <input id="file-input" type="file" accept=".bvh" title="Load animation BVH file (.bvh)" />
        <span id="bvh-file-name" class="file-name">not selected</span>
      </div>
      <div class="file-group">
        <span class="file-label">Character (.glb/.vrm)</span>
        <input id="model-input" type="file" accept=".glb,.vrm" title="Load character model file (.glb or .vrm)" />
        <span id="model-file-name" class="file-name">not selected</span>
      </div>
      <button id="retarget">Apply To Model</button>
      <button id="zoom-in">Zoom +</button>
      <button id="zoom-out">Zoom -</button>
      <button id="play">Play</button>
      <button id="pause">Pause</button>
      <button id="stop">Stop</button>
      <input id="timeline" type="range" min="0" max="1" step="0.001" value="0" />
      <div id="time" class="time">0.00 / 0.00</div>
      <button id="reset-camera">Reset Camera</button>
        <div id="status" class="status">Ready</div>
    </div>
    <div id="canvas-wrap">
      <div id="hint">LMB rotate, RMB pan, wheel zoom</div>
    </div>
  </div>
  <button id="retarget-fab" class="retarget-fab" type="button" title="Apply BVH to model">Retarget</button>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/",
        "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3/lib/three-vrm.module.min.js"
      }
    }
  </script>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
