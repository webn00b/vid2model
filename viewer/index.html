<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BVH Viewer</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f6fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #64748b;
      --accent: #0f766e;
      --border: #dbe5f0;
      --scene-bg: #f8fbff;
    }
    [data-theme="dark"] {
      color-scheme: dark;
      --bg: #0f1117;
      --panel: #1a1d27;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #2dd4bf;
      --border: #2d3748;
      --scene-bg: #0d1117;
    }
    html, body {
      margin: 0;
      height: 100%;
      font-family: "Segoe UI", "SF Pro Text", "Arial", sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    #app {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    button, input[type="file"]::file-selector-button, select {
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 10px;
      padding: 7px 12px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text);
    }
    select {
      min-width: 180px;
      background: var(--panel);
      color: var(--text);
    }
    .file-group {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 8px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
    }
    .file-label {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    .file-name {
      font-size: 12px;
      color: var(--text);
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    input[type="range"] {
      width: 200px;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .time {
      font-size: 12px;
      color: var(--muted);
      min-width: 90px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .toolbar-sep {
      width: 1px;
      height: 24px;
      background: var(--border);
      flex-shrink: 0;
    }
    /* Status + spinner */
    .status {
      margin-left: auto;
      color: var(--muted);
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    .status.busy .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* Tools collapsible */
    .tools-toggle {
      font-size: 13px;
    }
    .tools-group {
      display: none;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      width: 100%;
      padding-top: 6px;
      border-top: 1px dashed var(--border);
    }
    .tools-group.open { display: flex; }
    /* Canvas */
    #canvas-wrap {
      position: relative;
      min-height: 0;
    }
    #hint {
      position: absolute;
      left: 12px;
      bottom: 12px;
      background: color-mix(in srgb, var(--panel) 90%, transparent);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
      color: var(--muted);
      z-index: 2;
    }
    /* FAB */
    .retarget-fab {
      position: fixed;
      right: 14px;
      bottom: 14px;
      z-index: 20;
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 600;
      background: var(--accent);
      color: #fff;
      box-shadow: 0 8px 24px rgba(15, 118, 110, 0.35);
    }
    .retarget-fab:hover { filter: brightness(1.08); }
    .retarget-fab:active { transform: translateY(1px); }
    @media (max-width: 720px) {
      .retarget-fab { right: 10px; bottom: 10px; padding: 11px 14px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="toolbar">
      <button id="load-default" class="primary" title="Load sample animation">Load Sample</button>
      <select id="animation-list" title="Select animation from available files">
        <option value="">Choose animation...</option>
      </select>
      <div class="file-group">
        <span class="file-label">Animation (.bvh)</span>
        <input id="file-input" type="file" accept=".bvh" title="Load animation BVH file (.bvh)" />
        <span id="bvh-file-name" class="file-name">not selected</span>
      </div>
      <div class="file-group">
        <span class="file-label">Character (.glb/.vrm)</span>
        <input id="model-input" type="file" accept=".glb,.vrm" title="Load character model file (.glb or .vrm)" />
        <span id="model-file-name" class="file-name">not selected</span>
      </div>
      <button id="auto-setup" class="primary" title="Analyze the loaded model, pick the best available profile, and apply the animation">Auto Setup</button>
      <div class="toolbar-sep"></div>
      <button id="play-toggle" title="Play / Pause (Space)">&#9654; Play</button>
      <button id="stop" title="Stop and rewind">&#9632; Stop</button>
      <input id="timeline" type="range" min="0" max="1" step="0.001" value="0" title="Scrub timeline (&#8592;/&#8594; to step)" />
      <div id="time" class="time">0.00 / 0.00</div>
      <div class="toolbar-sep"></div>
      <button id="reset-camera" title="Reset camera (R)">Reset Camera</button>
      <div class="toolbar-sep"></div>
      <button id="toggle-skeleton" title="Show/hide source skeleton">Hide Skeleton</button>
      <button id="toggle-model" title="Show/hide character model">Hide Model</button>
      <div class="toolbar-sep"></div>
      <button id="dark-toggle" title="Toggle dark mode">&#9790;</button>
      <button class="tools-toggle" id="tools-toggle" title="Show/hide developer tools">Tools &#9660;</button>
      <div id="status" class="status"><span class="spinner"></span><span id="status-text">Ready</span></div>
      <!-- Developer tools (collapsible) -->
      <div class="tools-group" id="tools-group">
        <button id="save-model-setup" title="Save the current model setup for future retargets on this machine">Save Model Setup</button>
        <button id="retarget" title="Apply animation to model manually">Apply To Model</button>
        <button id="validate-profile" title="Mark the current rig profile as validated for this model">Validate Profile</button>
        <button id="export-profile" title="Download validated rig profile JSON for the current model">Export Profile</button>
        <button id="export-model-analysis" title="Download skeleton and proportion analysis for the current model">Export Model Analysis</button>
        <button id="import-profile" title="Import rig profile JSON and save it as validated">Import Profile</button>
        <input id="profile-input" type="file" accept=".json,application/json" hidden />
      </div>
    </div>
    <div id="canvas-wrap">
      <div id="hint">LMB rotate, RMB pan, wheel zoom</div>
    </div>
  </div>
  <button id="retarget-fab" class="retarget-fab" type="button" title="Apply BVH to model">Retarget</button>

  <script type="importmap">
    {
      "imports": {
        "three": "./vendor/three/three.module.js",
        "three/addons/": "./vendor/three/addons/",
        "@pixiv/three-vrm": "./vendor/@pixiv/three-vrm/three-vrm.module.min.js"
      }
    }
  </script>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
